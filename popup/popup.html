<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIME Filter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="header-icon">⬡</span>
        <span class="header-title">MIME<strong>Filter</strong></span>
      </div>
      <label class="toggle-switch" title="Enable/disable filtering">
        <input type="checkbox" id="toggle-enabled" />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label" id="toggle-label">ON</span>
      </label>
    </header>

    <!-- Tab bar -->
    <nav class="tabs">
      <button class="tab active" data-tab="rules">Rules</button>
      <button class="tab" data-tab="log">Log</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <!-- ── RULES TAB ── -->
    <section class="tab-panel active" id="panel-rules">

      <div class="mode-row">
        <span class="mode-label">Mode</span>
        <div class="segmented" id="mode-selector">
          <button class="seg active" data-mode="allowlist">Allowlist</button>
          <button class="seg" data-mode="denylist">Denylist</button>
        </div>
      </div>
      <p class="mode-hint" id="mode-hint"></p>

      <div class="rule-input-wrap">
        <div class="rule-input-row">
          <input
            type="text"
            id="rule-input"
            class="rule-input"
            placeholder="Search or type a MIME type…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="add-rule-btn" class="btn-add" title="Add rule">＋</button>
        </div>
        <ul class="search-dropdown" id="search-dropdown"></ul>
      </div>

      <ul class="rule-list" id="rule-list">
        <!-- populated by JS -->
      </ul>

      <div class="bulk-actions-row">
        <span class="quick-label">Bulk:</span>
        <button class="btn-bulk" id="allow-all-btn" title="Add all 677 known MIME types">Allow All</button>
        <button class="btn-bulk danger" id="none-btn" title="Remove all rules">None</button>
      </div>

      <div style="display:none"><div id="quick-tags"></div></div>

    </section>

    <!-- ── LOG TAB ── -->
    <section class="tab-panel" id="panel-log">

      <div class="log-toolbar">
        <span class="log-count" id="log-count">0 entries</span>
        <div class="log-actions">
          <button class="btn-ghost" id="export-btn">Export JSON</button>
          <button class="btn-ghost danger" id="clear-log-btn">Clear</button>
        </div>
      </div>

      <ul class="log-list" id="log-list">
        <!-- populated by JS -->
      </ul>

      <p class="log-empty" id="log-empty">No downloads logged yet.</p>

    </section>

    <!-- ── SETTINGS TAB ── -->
    <section class="tab-panel" id="panel-settings">

      <div class="setting-row">
        <label class="setting-label" for="max-log-input">
          Max log entries
          <span class="setting-hint">Oldest entries are dropped when limit is reached.</span>
        </label>
        <input type="number" id="max-log-input" class="setting-input" min="10" max="5000" />
      </div>

      <div class="setting-row">
        <label class="setting-label">
          Unknown MIME type behaviour
          <span class="setting-hint">When the browser reports no MIME type for a download.</span>
        </label>
        <div class="segmented" id="unknown-mime-selector">
          <button class="seg active" data-unknown="block">Block</button>
          <button class="seg" data-unknown="allow">Allow</button>
        </div>
      </div>

      <div class="setting-row">
        <label class="setting-label">
          Notifications
          <span class="setting-hint">Show a notification when a download is blocked.</span>
        </label>
        <label class="toggle-switch small">
          <input type="checkbox" id="notify-toggle" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>

      <button class="btn-save" id="save-settings-btn">Save Settings</button>
      <p class="save-status" id="save-status"></p>

      <div class="about-block">
        <p>MIME Filter v1.0.0 by <a href="https://github.com/macbuildssys" style="color:var(--amber);text-decoration:none">macbuildssys</a></p>
      </div>

    </section>

  </div>
  <script src="popup.js"></script>
</body>
</html>
